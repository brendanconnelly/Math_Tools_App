<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Math calculators with step-by-step solutions — Quadratic, Heron's, Prime Factorization, Base Conversion, and more">
  <title>{% block toptitle %}Math Tools{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f8fafc;
      --surface:      #ffffff;
      --border:       #e2e8f0;
      --text:         #0f172a;
      --text-muted:   #64748b;
      --accent:       #2563eb;
      --accent-hover: #1d4ed8;
      --accent-light: #eff6ff;
      --accent-border:#bfdbfe;
      --nav-bg:       #0f172a;
      --radius:       8px;
      --shadow:       0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md:    0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -1px rgba(0,0,0,.05);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Nav ──────────────────────────────────────── */
    nav {
      background: var(--nav-bg);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 54px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .nav-brand {
      color: #f8fafc;
      font-weight: 600;
      font-size: .9375rem;
      text-decoration: none;
      letter-spacing: -.015em;
    }
    .nav-brand span { color: #60a5fa; }
    .nav-links { display: flex; gap: 1.5rem; align-items: center; }
    .nav-links a {
      color: #94a3b8;
      text-decoration: none;
      font-size: .875rem;
      transition: color .15s;
    }
    .nav-links a:hover { color: #f8fafc; }

    /* ─── Container ────────────────────────────────── */
    .container {
      max-width: 840px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
    }

    /* ─── Page header ──────────────────────────────── */
    .page-header { margin-bottom: 1.75rem; }
    .page-header h1 {
      font-size: 1.625rem;
      font-weight: 700;
      letter-spacing: -.025em;
      color: var(--text);
      margin-bottom: .375rem;
      line-height: 1.25;
    }
    .page-header p {
      color: var(--text-muted);
      font-size: .9375rem;
      max-width: 600px;
    }

    /* ─── Tool list ────────────────────────────────── */
    .tool-grid {
      display: flex;
      flex-direction: column;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .tool-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: .9375rem 1.25rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: background .12s, color .12s;
    }
    .tool-card:last-child { border-bottom: none; }
    .tool-card:hover {
      background: var(--accent-light);
      color: var(--text);
    }
    .tool-icon {
      font-size: .8125rem;
      font-weight: 700;
      flex-shrink: 0;
      width: 2.125rem;
      height: 2.125rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 6px;
      font-family: "SFMono-Regular", Consolas, monospace;
    }
    .tool-card:hover .tool-icon {
      background: var(--accent);
      color: #fff;
    }
    .tool-text { flex: 1; min-width: 0; }
    .tool-name { font-weight: 500; font-size: .9375rem; line-height: 1.3; }
    .tool-sub {
      font-size: .8rem;
      color: var(--text-muted);
      margin-top: .1rem;
    }
    .tool-arrow { color: #cbd5e1; font-size: 1rem; flex-shrink: 0; }

    .section-label {
      font-size: .6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-muted);
      margin-bottom: .625rem;
      margin-top: 2rem;
    }
    .section-label:first-child { margin-top: 0; }

    /* ─── Form card ────────────────────────────────── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.75rem 2rem;
    }
    .form-row {
      display: flex;
      align-items: flex-end;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .form-group { display: flex; flex-direction: column; gap: .3rem; }
    .form-group label {
      font-size: .75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    input[type="text"],
    input[type="number"] {
      height: 38px;
      padding: 0 .75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .9375rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      transition: border-color .15s, box-shadow .15s;
      outline: none;
      min-width: 0;
    }
    input[type="text"]:focus,
    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
      background: var(--surface);
    }
    input.w-xs { width: 72px; }
    input.w-sm { width: 120px; }
    input.w-md { width: 210px; }
    input.w-lg { width: 310px; }

    .form-check {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-top: .75rem;
    }
    .form-check input[type="checkbox"],
    .form-check input[type="radio"] {
      width: 15px; height: 15px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .form-check label {
      font-size: .875rem;
      color: var(--text-muted);
      cursor: pointer;
    }
    .form-checks { display: flex; flex-direction: column; gap: .375rem; margin-top: .75rem; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .375rem;
      padding: 0 1.125rem;
      height: 38px;
      border-radius: 6px;
      font-size: .9375rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      border: 1px solid transparent;
      transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
      line-height: 1;
    }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border-color: var(--border);
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text); border-color: #94a3b8; }

    /* ─── Output ───────────────────────────────────── */
    .output-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2rem 2.25rem;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: .875rem;
      line-height: 1.85;
      overflow-x: auto;
    }
    .output-line { display: block; white-space: pre-wrap; word-break: break-word; }
    .output-gap  { display: block; height: .55rem; }

    /* ─── Info box ─────────────────────────────────── */
    .info-box {
      background: var(--accent-light);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius);
      padding: 1.375rem 1.625rem;
      margin-top: 1.5rem;
    }
    .info-box h3 {
      font-size: .9375rem;
      font-weight: 600;
      color: #1d4ed8;
      margin-bottom: .625rem;
    }
    .info-box p, .info-box li {
      font-size: .875rem;
      color: #1e40af;
      line-height: 1.65;
    }
    .info-box ul, .info-box ol { padding-left: 1.25rem; margin-top: .5rem; }
    .info-box li { margin-bottom: .3rem; }
    .info-box .video-wrap {
      margin-top: 1.125rem;
      border-radius: 6px;
      overflow: hidden;
      max-width: 560px;
    }
    .info-box iframe { display: block; border: none; max-width: 100%; }

    /* ─── Page actions ─────────────────────────────── */
    .page-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
      gap: .75rem;
      flex-wrap: wrap;
    }

    hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

    /* ─── Two-column tool grid ─────────────────────── */
    .tool-grid-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 1rem;
    }

    /* ─── Responsive ───────────────────────────────── */
    @media (max-width: 640px) {
      nav { padding: 0 1rem; }
      .nav-links a:not(:last-child) { display: none; }
      .container { padding: 1.5rem 1rem 3rem; }
      .page-header h1 { font-size: 1.375rem; }
      .tool-card { padding: .8125rem 1rem; }
      .form-card { padding: 1.25rem 1.25rem; }
      .form-row { flex-direction: column; align-items: flex-start; }
      .output-card { padding: 1.25rem; font-size: .8125rem; }
      .tool-grid-columns { grid-template-columns: 1fr; gap: .75rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">Math<span>Tools</span></a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/shortcalcs/">More Calculators</a>
    <a href="/ContactUs/">Contact</a>
  </div>
</nav>

<div class="container">
  <header class="page-header">
    <h1>{% block title %}{% endblock %}</h1>
    <p>{% block shortdesciption %}{% endblock %}</p>
  </header>

  {% block content %}{% endblock %}
</div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    var card = document.querySelector(".output-card");
    if (!card) return;

    var supMap = {"²":"2","³":"3","⁴":"4","⁵":"5","⁶":"6","⁷":"7","⁸":"8","⁹":"9","⁰":"0","¹":"1"};

    card.querySelectorAll(".output-line").forEach(function(el) {
      var text = el.textContent;
      if (!text.trim()) return;
      if (!/[√²³⁴⁵⁶⁷⁸⁹⁰¹⁄]/.test(text)) return;

      // 1. Radicals: match N√M first (N > 1 shows coefficient), then bare √M
      text = text.replace(/(\d+)√(\d+)/g, function(_, c, r) {
        return c === "1" ? "\\(\\sqrt{" + r + "}\\)" : "\\(" + c + "\\sqrt{" + r + "}\\)";
      });
      // Any remaining √M (not preceded by a digit that was already consumed above)
      text = text.replace(/√(\d+)/g, function(_, r) {
        return "\\(\\sqrt{" + r + "}\\)";
      });

      // 2. Unicode fraction slash: 1⁄4 → \tfrac{1}{4}
      text = text.replace(/(\d+)⁄(\d+)/g, "\\(\\tfrac{$1}{$2}\\)");

      // 3. Unicode superscripts: a² → \(a^{2}\),  16¹ → \(16^{1}\)
      text = text.replace(/([a-zA-Z\d]+)([²³⁴⁵⁶⁷⁸⁹⁰¹]+)/g, function(_, base, sups) {
        var exp = sups.split("").map(function(c) { return supMap[c] || c; }).join("");
        return "\\(" + base + "^{" + exp + "}\\)";
      });

      // 4. Merge adjacent math blocks separated only by operators/spaces:
      //    \(A\) OP \(B\)  →  \(A OP B\)
      //    Correct fix: strip the \)OP\( boundary, leaving one outer pair.
      text = text.replace(/\\\)\s*([+\-=×⋅·*\/]+)\s*\\\(/g, function(_, op) {
        return " " + op.trim() + " ";
      });

      el.textContent = text;
    });

    renderMathInElement(card, {
      delimiters: [
        {left: "\\(", right: "\\)", display: false},
        {left: "\\[", right: "\\]", display: true}
      ],
      throwOnError: false
    });
  });
</script>
</body>
</html>
